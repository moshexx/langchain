<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Q&A Bot | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            color: #e9ecef;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px border rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #4cc9f0;
            outline: none;
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4361ee, #4cc9f0);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.4);
        }
        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' .'; }
            40% { content: ' ..'; }
            60% { content: ' ...'; }
            80%, 100% { content: ''; }
        }
        .response-card {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                Smart Q&A Bot
            </h1>
            <p class="text-gray-400 text-lg">Experience intelligence with structured reasoning.</p>
        </header>

        <!-- Search Box -->
        <div class="glass p-6 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="questionInput" 
                    placeholder="Ask me anything..." 
                    class="input-glass flex-1 px-6 py-4 rounded-xl text-lg font-light"
                    onkeypress="if(event.key === 'Enter') askQuestion()">
                <button onclick="askQuestion()" id="askBtn"
                    class="btn-gradient px-8 py-4 rounded-xl font-semibold text-white shadow-lg">
                    Analyze
                </button>
            </div>
        </div>

        <!-- Output Container -->
        <div id="loading" class="hidden text-center py-12">
            <div class="text-2xl font-light text-blue-300 loading-dots">Thinking</div>
        </div>

        <div id="responseContainer" class="space-y-6">
            <!-- Dynamic Content Here -->
        </div>
    </div>

    <script>
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const btn = document.getElementById('askBtn');
            const loading = document.getElementById('loading');
            const container = document.getElementById('responseContainer');
            
            const question = input.value.trim();
            if (!question) return;

            // UI State
            input.disabled = true;
            btn.disabled = true;
            loading.classList.remove('hidden');
            container.innerHTML = '';

            try {
                const startTime = Date.now();
                const response = await fetch(`http://localhost:8000/api/ask?q=${encodeURIComponent(question)}`);
                const data = await response.json();
                
                renderResponse(question, data);
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="glass p-6 border-red-500/50 border">
                    <p class="text-red-400">Failed to connect to the bot. Make sure backend.py is running!</p>
                </div>`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
                loading.classList.add('hidden');
                input.value = '';
            }
        }

        function renderResponse(question, data) {
            const container = document.getElementById('responseContainer');
            
            const html = `
                <div class="response-card glass p-8 shadow-xl border border-white/10">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-xl font-semibold text-blue-300">Question</h2>
                        <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${
                            data.confidence === 'high' ? 'bg-green-500/20 text-green-400' : 
                            data.confidence === 'medium' ? 'bg-yellow-500/20 text-yellow-400' : 
                            'bg-red-500/20 text-red-400'
                        }">
                            ${data.confidence} Confidence
                        </span>
                    </div>
                    <p class="text-2xl font-light mb-8 italic text-white/90">"${question}"</p>
                    
                    <div class="space-y-8">
                        <section>
                            <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3">Answer</h3>
                            <div class="text-xl leading-relaxed text-gray-200">${data.answer}</div>
                        </section>

                        <div class="grid md:grid-cols-2 gap-8">
                            <section class="bg-white/5 p-5 rounded-2xl">
                                <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 flex items-center">
                                    <span class="mr-2">🧠</span> Reasoning
                                </h3>
                                <p class="text-gray-400 text-sm leading-relaxed">${data.reasoning}</p>
                            </section>

                            <section class="bg-white/5 p-5 rounded-2xl">
                                <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 flex items-center">
                                    <span class="mr-2">🔍</span> Follow-up Questions
                                </h3>
                                <ul class="space-y-2">
                                    ${data.follow_up_questions.map(q => `
                                        <li class="text-sm text-blue-400/80 cursor-pointer hover:text-blue-300 transition-colors" 
                                            onclick="document.getElementById('questionInput').value='${q}'; askQuestion()">
                                            → ${q}
                                        </li>
                                    `).join('')}
                                </ul>
                            </section>
                        </div>
                        
                        ${data.sources_needed ? `
                            <div class="mt-4 p-3 bg-blue-500/10 rounded-lg flex items-center text-xs text-blue-300">
                                <span class="mr-2">ℹ️</span> Note: This answer might benefit from external source verification.
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
